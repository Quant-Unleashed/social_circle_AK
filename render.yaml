services:
  - type: web
    name: social-circle-ak
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SESSION_SECRET
        sync: false
      - key: APP_INVITE_CODE
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
